<?xml version="1.0" encoding="UTF-8"?>
<svg width="800px" height="800px" viewBox="0 0 24 24" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <title>loop_24_regular</title>
    <g stroke="#8a5f7e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <!-- Top arc: from (5, 14) curving over the top to (18, 9.5) -->
        <path d="M 5 14 A 7 7 0 0 1 18 9.5"/>
        <!-- Arrowhead at top-right tip, pointing tangent-forward -->
        <polyline points="16 7.5 18 9.5 16 11.5"/>
        <!-- Bottom arc: from (19, 10) curving under to (6, 14.5) -->
        <path d="M 19 10 A 7 7 0 0 1 6 14.5"/>
        <!-- Arrowhead at bottom-left tip, pointing tangent-forward -->
        <polyline points="8 12.5 6 14.5 8 16.5"/>
    </g>
</svg>
